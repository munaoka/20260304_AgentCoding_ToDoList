<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルなToDoリスト</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 ToDoリスト</h1>
        
        <button class="toggle-label-mgmt" onclick="toggleLabelManagement()">⚙️ ラベル管理</button>

        <div class="label-management" id="labelManagement" style="display: none;">
            <h3>ラベル設定</h3>
            <div class="label-input-section">
                <input 
                    type="text" 
                    id="newLabelInput" 
                    placeholder="新しいラベルを入力..." 
                    onkeypress="if(event.key==='Enter') addLabel()"
                >
                <button onclick="addLabel()">ラベル追加</button>
            </div>
            <div class="label-list" id="labelList"></div>
        </div>
        
        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="新しいタスクを入力..." 
                onkeypress="if(event.key==='Enter') addTask()"
            >
            <select id="labelSelect"></select>
            <button onclick="addTask()">追加</button>
        </div>

        <div class="label-filters" id="labelFilters"></div>

        <ul id="taskList" class="task-list"></ul>

        <div class="stats">
            <p>合計: <span id="totalCount">0</span> | 完了: <span id="completedCount">0</span></p>
        </div>

        <button onclick="clearCompleted()" class="clear-btn">完了タスクをクリア</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
